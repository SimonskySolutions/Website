<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Confirmed — Simonsky Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:      #4d6717;
            --dark-green: #394810;
            --light-1:    #f2ffcd;
            --light-2:    #e5ff9c;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-green);
            color: var(--light-1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--light-2);
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 480px;
            opacity: 0.85;
            margin-bottom: 0.6rem;
        }
        .back {
            margin-top: 2.5rem;
            display: inline-block;
            background: var(--light-2);
            color: var(--dark-green);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border-radius: 2px;
            transition: background 0.2s;
        }
        .back:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="icon">✓</div>
    <h1>Session Reserved</h1>
    <p>Your payment was successful and your consultation session is confirmed.</p>
    <p>You'll receive a calendar invite and details at your email within 24 hours.</p>
    <a href="/" class="back">← Back to Simonsky Solutions</a>
</body>
</html>
